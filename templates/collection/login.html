{% extends "collection/base.html" %}
{% block title %}负责人登录{% endblock %}
{% block content %}
<section class="login-card">
    <h1>负责人采集登录</h1>
    <p>使用管理员分配的个人账号登录，只能查看本人负责的示范点。</p>
    {% if form.errors %}<div class="form-error">用户名或密码不正确，请重新输入。</div>{% endif %}
    <form method="post" class="collector-form" data-login-form>
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        <label><span>用户名</span>{{ form.username }}</label>
        <label><span>密码</span>{{ form.password }}</label>
        <button class="primary-button" type="submit">登录</button>
    </form>
    <p class="application-hint">还没有负责人账号？<a href="{% url 'collection:create-demo-application' %}">申请成为示范户</a>，后台人员审核后将电话联系。</p>
</section>
{% endblock %}
{% block scripts %}{% load static %}<script src="{% static 'js/collection-login.js' %}" defer></script>{% endblock %}
