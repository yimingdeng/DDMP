{% if gallery_images %}
<section class="media-section" aria-labelledby="gallery-title">
    <div class="section-heading compact">
        <span class="eyebrow dark">现场影像</span>
        <h2 id="gallery-title">图片画廊</h2>
    </div>
    <div class="media-gallery" data-media-gallery>
        {% for media in gallery_images %}
            <a class="gallery-item" href="{{ media.image.url }}"
               data-gallery-item data-caption="{{ media.title|default:media.alt_text }}">
                <img src="{{ media.display_image.url }}" alt="{{ media.alt_text }}" loading="lazy">
                {% if media.title or media.description %}
                    <span><strong>{{ media.title }}</strong>{{ media.description }}</span>
                {% endif %}
            </a>
        {% endfor %}
    </div>
</section>
{% endif %}
